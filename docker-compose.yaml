services:
  api:
    build: .
    deploy:
      replicas: 2
    restart: always
    environment:
      - DATABASE_URL=file:./prisma/dev.db
    volumes:
      - /prisma:/app/prisma

  nginx:
    image: nginx:latest
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api